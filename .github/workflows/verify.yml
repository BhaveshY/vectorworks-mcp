name: Verify

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-vectorworks:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: No-Vectorworks verification
        shell: powershell
        run: powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\scripts\verify-no-vectorworks.ps1
      - uses: actions/checkout@v4
        with:
          repository: BhaveshY/vectorworks-claude-plugin
          path: vectorworks-claude-plugin
      - name: Standalone plugin companion contract
        shell: powershell
        run: powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File .\vectorworks-claude-plugin\scripts\check-companion-contract.ps1 -RepoPath "${{ github.workspace }}"
